<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laberinto M2</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <!-- Inicio principal
  <div id="startOverlay" class="overlay">
    <h1>Laberinto</h1>
    <div class="footer-info">Desarrollador: Andrei Pabiarzhyn • FunTech Projects</div>
    <button id="startButton">Nuevo juego</button>
  </div>-->

  <!-- Inicio de nivel -->
  <div id="levelOverlay" class="overlay" style="display:none;">
    <h1 id="levelTitle">Nivel 1</h1>
    <p class="sub">Tienes 3 vidas. ¡Buena suerte!</p>
    <button id="levelStartButton">Comenzar</button>
  </div>

  <!-- Ventana de derrota (sin vidas) -->
  <div id="gameOverOverlay" class="overlay" style="display:none;">
    <h1>Ups, inténtalo de nuevo</h1>
    <p class="sub" id="lostLevelText">Perdiste en el nivel 1</p>
    <button id="gameOverOk">OK</button>
  </div>

  <!-- Ventana de victoria final -->
  <div id="victoryOverlay" class="overlay" style="display:none;">
    <h1>¡Victoria!</h1>
    <img id="victoryImage"
         src="assets/win.gif"
         alt="¡Victoria!">
    <button id="closeVictory">Cerrar</button>
  </div>

  <!-- Juego -->
  <div class="game-container">
    <div class="hud">
      <div id="levelBadge">Nivel: 1</div>
      <div id="scoreDisplay">Puntos: 0</div>
      <div id="lives" class="lives"></div>
    </div>

    <canvas id="mazeCanvas"></canvas>
    <div class="footer-info">Desarrollador: Andrei Pabiarzhyn • FunTech Projects</div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
